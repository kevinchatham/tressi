# ============================================
# 📦 Release Workflow
# --------------------------------------------
# This workflow handles the release process:
# 1. Pre-flight: Checks if version is already published
# 2. Publish NPM: Publishes to NPM if needed
# 3. Publish Docker: Publishes to GHCR if needed
# 4. Create Release: Creates a GitHub release
#
# 🔁 Triggered on push to main
# ============================================

name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  pre-flight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    outputs:
      npm_publish: ${{ steps.check-npm.outputs.publish }}
      docker_publish: ${{ steps.check-docker.outputs.publish }}
      create_release: ${{ steps.check-release.outputs.publish }}
      version: ${{ steps.check-npm.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org/'

      - name: Check NPM version status
        id: check-npm
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "version=${PACKAGE_VERSION}" >> $GITHUB_OUTPUT

          echo "Checking if version $PACKAGE_VERSION for $PACKAGE_NAME is published..."
          NPM_VERSION=$(npm view $PACKAGE_NAME@$PACKAGE_VERSION version 2>/dev/null || true)

          if [[ -z "$NPM_VERSION" ]]; then
            echo "Version $PACKAGE_VERSION is not published. Proceeding..."
            echo "publish=true" >> $GITHUB_OUTPUT
          else
            echo "Version $PACKAGE_VERSION is already published. Skipping."
            echo "publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.TRESSI_GITHUB_TOKEN }}

      - name: Check Docker version status
        id: check-docker
        run: |
          TAG_NAME=${{ steps.check-npm.outputs.version }}
          IMAGE_PATH="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG_NAME}"
          echo "Checking if $IMAGE_PATH exists..."
          if docker manifest inspect "$IMAGE_PATH" > /dev/null 2>&1; then
            echo "Version $TAG_NAME already exists in registry. Skipping."
            echo "publish=false" >> $GITHUB_OUTPUT
          else
            echo "Version $TAG_NAME does not exist. Proceeding."
            echo "publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Check GitHub Release status
        id: check-release
        run: |
          TAG_NAME="v${{ steps.check-npm.outputs.version }}"
          if gh release view "$TAG_NAME" > /dev/null 2>&1; then
            echo "Release $TAG_NAME already exists. Skipping."
            echo "publish=false" >> $GITHUB_OUTPUT
          else
            echo "Release $TAG_NAME does not exist. Proceeding."
            echo "publish=true" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.TRESSI_GITHUB_TOKEN }}

  publish-npm:
    name: Publish to NPM
    needs: pre-flight
    if: needs.pre-flight.outputs.npm_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org/'
          node-auth-token: ${{ secrets.TRESSI_NPM_TOKEN }}

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Publish to NPM
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TRESSI_NPM_TOKEN }}

  publish-docker:
    name: Publish Docker Image
    needs: pre-flight
    if: needs.pre-flight.outputs.docker_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.TRESSI_GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.pre-flight.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.pre-flight.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    needs: [pre-flight, publish-npm, publish-docker]
    if: |
      always() && 
      needs.pre-flight.outputs.create_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create GitHub Release
        run: |
          gh release create "v${{ needs.pre-flight.outputs.version }}" \
            --title "Release v${{ needs.pre-flight.outputs.version }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.TRESSI_GITHUB_TOKEN }}
