<code-editor
  [value]="displayValue()"
  language="json"
  [theme]="daisyTheme()"
  [lineWrapping]="true"
  [languages]="languages"
  [placeholder]="placeholder()"
  setup="minimal"
  (change)="handleValueChange($event)"
  (blur)="handleBlur()"
  class="font-mono"
  [disabled]="disabled()"
/>
@if (error()) {
  <p class="label text-error mt-1">{{ error() }}</p>
}
