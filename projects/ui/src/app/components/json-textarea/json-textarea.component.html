<div class="relative">
  <code-editor
    [value]="displayValue()"
    language="json"
    [theme]="daisyTheme()"
    [lineWrapping]="true"
    [languages]="languages"
    [placeholder]="placeholder()"
    setup="minimal"
    (change)="handleValueChange($event)"
    (blur)="handleBlur()"
    class="font-mono"
    [disabled]="disabled()"
  />
  @if (showCopyButton()) {
    <div class="absolute top-2 right-2 z-10">
      <app-button
        (click)="copyToClipboard()"
        [title]="'Copy'"
        [icon]="'copy_all'"
        [secondaryIcon]="'check'"
        [toggled]="copied()"
        [ghost]="true"
      />
    </div>
  }
</div>
@if (error()) {
  <p class="label text-error mt-1">{{ error() }}</p>
}
