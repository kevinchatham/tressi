@if (isTestRunning()) {
  <app-button
    (click)="stop()"
    (onKeyDown)="stop()"
    [title]="'Stop Test'"
    [color]="'error'"
    [icon]="'close'"
  />
} @else {
  <app-button
    (click)="start()"
    (onKeyDown)="start()"
    [title]="'Start Test'"
    [color]="'primary'"
    [icon]="'dynamic_form'"
    [disabled]="isDisabled()"
    data-e2e="start-test-btn"
  />
}
