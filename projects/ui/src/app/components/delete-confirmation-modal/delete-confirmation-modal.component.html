<div
  class="modal"
  [class.modal-open]="isOpen()"
  (click)="handleBackdropClick($event)"
  (onKeyDown)="handleBackdropClick($event)"
>
  <div class="modal-box max-w-md rounded-2xl p-2">
    <!-- Header -->
    <div class="p-4">
      <h3 class="text-xl font-semibold tracking-tight">Delete {{ itemLabel() }}</h3>
    </div>

    <!-- Body -->
    <div class="text-base-content/80 px-4">
      <p class="leading-relaxed">
        @if (isBulkDelete()) {
          Are you sure you want to delete these
          <span class="font-semibold">{{ bulkCount() }}</span>
          {{ itemLabel() | lowercase }}?
        } @else {
          Are you sure you want to delete this
          <span class="font-semibold">{{ itemLabel() | lowercase }}</span
          >?
        }
      </p>

      <!-- Warning (Subtle, modern) -->
      <div class="bg-error/10 text-error mt-4 flex items-center gap-3 rounded-xl p-4 text-sm">
        <app-icon name="warning" class="opacity-80" />
        <span>This action cannot be undone.</span>
      </div>
    </div>

    <!-- Footer -->
    <div class="border-base-200 flex justify-end gap-3 border-t p-4">
      <app-button
        (click)="onCancel()"
        (keydown)="onCancel()"
        [ghost]="true"
        [title]="'Cancel'"
        [icon]="'close'"
      />
      <app-button
        (click)="onConfirm()"
        (keydown)="onConfirm()"
        [title]="'Delete'"
        [color]="'error'"
        [icon]="'delete'"
      />
    </div>
  </div>
</div>
