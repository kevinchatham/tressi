<form (submit)="onSubmit($event)" class="space-y-6 p-8">
  <!-- Tabs Navigation -->
  <div class="tabs tabs-box">
    <button
      type="button"
      class="tab"
      [class.tab-active]="activeTab() === 'basic'"
      (click)="setActiveTab('basic')"
    >
      <app-icon name="settings" class="h-4 w-4" />
      Basic
    </button>
    <button
      type="button"
      class="tab"
      [class.tab-active]="activeTab() === 'headers'"
      (click)="setActiveTab('headers')"
    >
      <app-icon name="notes" class="h-4 w-4" />
      Headers
    </button>
    <button
      type="button"
      class="tab"
      [class.tab-active]="activeTab() === 'requests'"
      (click)="setActiveTab('requests')"
    >
      <app-icon name="send" class="h-4 w-4" />
      Requests
    </button>
    <button
      type="button"
      class="tab"
      [class.tab-active]="activeTab() === 'worker-exit'"
      (click)="setActiveTab('worker-exit')"
    >
      <app-icon name="warning" class="h-4 w-4" />
      Worker Exit
    </button>
  </div>

  <!-- Tab Content -->
  <div class="space-y-6">
    <!-- Basic Configuration Tab -->
    @if (activeTab() === 'basic') {
      <app-basic-config [configForm]="configForm"
        [configModel]="configModel()"
       />
    }

    <!-- Global Headers Tab -->
    @if (activeTab() === 'headers') {
      <app-global-headers [configForm]="configForm"
        [configModel]="configModel()"
       />
    }

    <!-- Requests Configuration Tab -->
    @if (activeTab() === 'requests') {
      <app-requests-config [configForm]="configForm"
        [configModel]="configModel()"
        (addRequest)="addRequest()"
        (removeRequest)="removeRequest($event)"
       />
    }

    <!-- Worker Early Exit Tab -->
    @if (activeTab() === 'worker-exit') {
      <app-worker-early-exit [configForm]="configForm"
        [configModel]="configModel()"
        (addPerEndpointThreshold)="addPerEndpointThreshold()"
        (removePerEndpointThreshold)="removePerEndpointThreshold($event)"
        (addWorkerExitStatusCode)="addWorkerExitStatusCode()"
        (removeWorkerExitStatusCode)="removeWorkerExitStatusCode($event)"
       />
    }
  </div>

  <!-- Form Actions -->
  <div class="card bg-base-100 shadow-xl">
    <div class="card-body">
      <div class="card-actions justify-end">
        <button
          type="button"
          class="btn btn-ghost"
          (click)="configSaved.emit(configModel())"
        >
          Cancel
        </button>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="!isFormValid() || isLoading()"
        >
          @if (isLoading()) {
            <span class="loading loading-spinner loading-sm"></span>
          }
          Save Configuration
        </button>
      </div>

      @if (!isFormValid()) {
        <div class="alert alert-warning mt-4">
          <app-icon name="warning" class="h-6 w-6 shrink-0" />
          <span>Please fix the validation errors above before saving.</span>
        </div>
      }
    </div>
  </div>
</form>
