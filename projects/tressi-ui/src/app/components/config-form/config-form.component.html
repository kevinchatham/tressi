<form (submit)="onSubmit($event)" class="space-y-4">
  <!-- Tabs Navigation -->
  <div class="border-neutral border-b">
    <!-- Sub Component Navigation -->
    <nav class="flex items-center justify-around">
      <button
        type="button"
        class="flex w-full cursor-pointer items-center justify-center gap-2 border-b-2 px-1 py-4 text-sm font-medium transition-colors"
        [class.border-primary]="activeTab() === 'basic'"
        [class.text-primary]="activeTab() === 'basic'"
        [class.border-transparent]="activeTab() !== 'basic'"
        [class.text-base-content/60]="activeTab() !== 'basic'"
        [class.hover:text-base-content]="activeTab() !== 'basic'"
        (click)="setActiveTab('basic')"
      >
        <app-icon name="stat_1" />
        Basic
      </button>
      <button
        type="button"
        class="flex w-full cursor-pointer items-center justify-center gap-2 border-b-2 px-1 py-4 text-sm font-medium transition-colors"
        [class.border-primary]="activeTab() === 'global'"
        [class.text-primary]="activeTab() === 'global'"
        [class.border-transparent]="activeTab() !== 'global'"
        [class.text-base-content/60]="activeTab() !== 'global'"
        [class.hover:text-base-content]="activeTab() !== 'global'"
        (click)="setActiveTab('global')"
      >
        <app-icon name="stat_2" />
        Global
      </button>
      <button
        type="button"
        class="flex w-full cursor-pointer items-center justify-center gap-2 border-b-2 px-1 py-4 text-sm font-medium transition-colors"
        [class.border-primary]="activeTab() === 'advanced'"
        [class.text-primary]="activeTab() === 'advanced'"
        [class.border-transparent]="activeTab() !== 'advanced'"
        [class.text-base-content/60]="activeTab() !== 'advanced'"
        [class.hover:text-base-content]="activeTab() !== 'advanced'"
        (click)="setActiveTab('advanced')"
      >
        <app-icon name="stat_3" />
        Advanced
      </button>
    </nav>
  </div>

  <!-- Tab Content -->
  <div class="space-y-6">
    <!-- Basic Configuration Tab -->
    @if (activeTab() === 'basic') {
      <app-basic-config
        [form]="form"
        [model]="model()"
        (addRequest)="addRequest()"
        (removeRequest)="removeRequest($event)"
        (jsonTextareaChange)="onJsonTextAreaChange()"
        (addRequestExitStatusCode)="addRequestExitStatusCode($event)"
        (removeRequestExitStatusCode)="
          removeRequestExitStatusCode($event.requestIndex, $event.codeIndex)
        "
      />
    }

    <!-- Global Configuration Tab -->
    @if (activeTab() === 'global') {
      <app-global-config
        [form]="form"
        [model]="model()"
        (addExitStatusCode)="addGlobalExitStatusCode()"
        (removeExitStatusCode)="removeGlobalExitStatusCode($event)"
        (jsonTextareaChange)="onJsonTextAreaChange()"
      />
    }

    <!-- Advanced Configuration Tab -->
    @if (activeTab() === 'advanced') {
      <app-advanced-config [form]="form" [model]="model()" />
    }
  </div>

  @if (form().touched() && form().invalid() && formErrors().length > 0) {
    <div class="-pt-2">
      <span class="text-error text-sm">Additional Validation Errors</span>
      <ul>
        @for (error of formErrors(); track error) {
          <li class="text-error ml-4 text-sm">- {{ error }}.</li>
        }
      </ul>
    </div>
  }

  <!-- Form Actions -->
  <div class="bg-base-300 px-8 py-4">
    <div class="flex justify-end gap-3">
      <app-button
        (click)="onCancel($event)"
        [color]="'error'"
        [ghost]="true"
        [title]="'Cancel'"
        [icon]="'close'"
      />
      <div class="flex items-center gap-2">
        <app-button
          [color]="'success'"
          [title]="'Save'"
          [icon]="'check'"
          [type]="'submit'"
          [disabled]="!isFormValid()"
        />
      </div>
    </div>
  </div>
</form>
