<code-editor
  [value]="displayValue()"
  language="json"
  [theme]="daisyTheme()"
  [lineWrapping]="true"
  [languages]="languages"
  [placeholder]="placeholder()"
  setup="minimal"
  (change)="handleValueChange($event)"
  class="font-mono text-sm"
></code-editor>
@if (error()) {
  <p class="label text-error mt-1">{{ error() }}</p>
}
