<div class="dropdown dropdown-end" [class.dropdown-open]="showColumnSelector()">
  <button
    class="btn btn-ghost btn-circle gap-1"
    (click)="onToggleSelector()"
    (blur)="onCloseSelector()"
    tabindex="0"
  >
    <app-icon name="view_column" />
  </button>
  <div
    class="dropdown-content bg-base-100 rounded-box ring-base-content/10 z-50 w-[32rem] p-6 shadow-lg ring-1"
  >
    <div class="mb-4 flex items-center justify-between">
      <h3 class="text-base-content font-semibold">Customize Columns</h3>
      <button
        class="btn btn-xs btn-ghost"
        (click)="onResetColumns()"
        title="Reset to defaults"
      >
        Reset
      </button>
    </div>

    <!-- Three Column Groups -->
    <div class="grid grid-cols-3 gap-8">
      <!-- Basic Columns -->
      <div>
        <h4 class="text-base-content/70 text-sm font-medium">Basic</h4>
        @for (col of columnGroups()['basic']; track col.key) {
          <label
            class="hover:bg-base-200/50 my-4 flex cursor-pointer items-center rounded transition-colors duration-150"
          >
            <input
              type="checkbox"
              class="checkbox checkbox-sm mr-3"
              [checked]="col.visible"
              [disabled]="
                col.key === 'select' ||
                col.key === 'status' ||
                col.key === 'actions'
              "
              (change)="onToggleColumn(col.key)"
            />
            <span class="text-sm select-none">{{ col.label }}</span>
          </label>
        }
      </div>

      <!-- Performance Columns -->
      <div>
        <h4 class="text-base-content/70 text-sm font-medium">Performance</h4>
        @for (col of columnGroups()['performance']; track col.key) {
          <label
            class="hover:bg-base-200/50 my-4 flex cursor-pointer items-center rounded transition-colors duration-150"
          >
            <input
              type="checkbox"
              class="checkbox checkbox-sm mr-3"
              [checked]="col.visible"
              (change)="onToggleColumn(col.key)"
            />
            <span class="text-sm select-none">{{ col.label }}</span>
          </label>
        }
      </div>

      <!-- Advanced Columns -->
      <div>
        <h4 class="text-base-content/70 text-sm font-medium">Advanced</h4>
        @for (col of columnGroups()['advanced']; track col.key) {
          <label
            class="hover:bg-base-200/50 my-4 flex cursor-pointer items-center rounded transition-colors duration-150"
          >
            <input
              type="checkbox"
              class="checkbox checkbox-sm mr-3"
              [checked]="col.visible"
              (change)="onToggleColumn(col.key)"
            />
            <span class="text-sm select-none">{{ col.label }}</span>
          </label>
        }
      </div>
    </div>
  </div>
</div>
