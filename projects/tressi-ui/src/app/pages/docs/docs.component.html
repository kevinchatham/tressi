<div class="p-16">
  <app-header [title]="'Documentation'">
    <app-button
      (click)="goBack()"
      [icon]="'arrow_back'"
      [title]="'Back'"
      [ghost]="true"
    />
  </app-header>

  <div class="mx-auto flex max-w-6xl gap-8">
    <!-- Sidebar -->
    <div class="w-64 shrink-0">
      <div
        class="bg-base-200 border-base-content/5 flex flex-col gap-6 rounded-xl border-2 p-4"
      >
        @for (
          section of availableDocs() | keyvalue: preserveOrder;
          track section.key
        ) {
          <div>
            <a
              [routerLink]="
                section.key === 'Home'
                  ? ['/docs']
                  : ['/docs', section.value.path]
              "
              routerLinkActive="text-primary !opacity-100"
              [routerLinkActiveOptions]="{ exact: true }"
              class="mb-2 block cursor-pointer text-xs font-bold tracking-wider uppercase opacity-50 transition-opacity hover:opacity-100"
            >
              {{ section.key }}
            </a>
            <ul class="menu menu-sm p-0">
              @for (doc of section.value.docs; track doc.slug) {
                @if (doc.slug !== 'index') {
                  <li>
                    <a
                      [routerLink]="
                        section.value.path
                          ? ['/docs', section.value.path, doc.slug]
                          : ['/docs', doc.slug]
                      "
                      routerLinkActive="text-primary active"
                      class="capitalize"
                    >
                      {{ formatTitle(doc.slug) }}
                    </a>
                  </li>
                }
              }
            </ul>
          </div>
        }
      </div>
    </div>

    <!-- Content -->
    <div class="flex-1">
      @if (error()) {
        <div class="alert alert-error">
          <app-icon [name]="'error'" />
          <span>{{ error() }}</span>
        </div>
      }

      <div
        [class.hidden]="error()"
        [class.opacity-0]="isTransitioning()"
        class="markdown-body bg-base-200 border-base-content/5 max-w-none rounded-xl border-2 p-8 transition-opacity duration-200 ease-in-out"
      >
        <markdown
          [src]="markdownSrc()"
          (load)="onLoad()"
          (error)="onError()"
        ></markdown>
      </div>
    </div>
  </div>
</div>
