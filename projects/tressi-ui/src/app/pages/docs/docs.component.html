<div class="p-12">
  <app-header [title]="'Documentation'">
    <app-button
      (click)="goBack()"
      [icon]="'arrow_back'"
      [title]="'Back'"
      [ghost]="true"
    />
  </app-header>

  <div class="mx-auto flex max-w-6xl gap-4">
    <!-- Sidebar -->
    <app-docs-menu [availableDocs]="availableDocs()" />

    <!-- Content -->
    <div class="flex-1">
      @if (error()) {
        <div class="alert alert-error">
          <app-icon [name]="'error'" />
          <span>{{ error() }}</span>
        </div>
      }

      <div
        [class.hidden]="error()"
        [class.opacity-0]="isTransitioning()"
        class="markdown-body bg-base-200 border-base-content/5 max-w-none rounded-xl border-2 p-8 transition-opacity duration-200 ease-in-out"
      >
        <markdown [src]="markdownSrc()" (load)="onLoad()" (error)="onError()" />
      </div>
    </div>
  </div>
</div>
