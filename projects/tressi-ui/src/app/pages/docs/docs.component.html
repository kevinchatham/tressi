<div class="p-12">
  <app-header [title]="'Docs'">
    <app-button
      (click)="appRouter.back()"
      [icon]="'arrow_back'"
      [title]="'Back'"
      [ghost]="true"
      [disabled]="isBaseUrl()"
    />

    <app-button
      (click)="appRouter.toHome()"
      [color]="'info'"
      [title]="'Dashboard'"
      [icon]="'browse_activity'"
    />
  </app-header>

  <div class="mx-auto flex max-w-6xl items-start gap-4">
    <!-- Sidebar -->
    <div class="sticky top-4 z-10">
      <app-docs-menu [availableDocs]="availableDocs()" />
    </div>

    <!-- Content -->
    <div class="flex-1">
      @if (error()) {
        <div class="alert alert-error">
          <app-icon [name]="'error'" />
          <span>{{ error() }}</span>
        </div>
      }

      <div
        [class.hidden]="error()"
        [class.opacity-0]="isTransitioning()"
        class="markdown-body bg-base-300/70 border-base-content/5 max-w-none rounded-xl border-2 p-8 transition-opacity duration-100 ease-in-out"
      >
        <markdown [src]="markdownSrc()" (load)="onLoad()" (error)="onError()" />
      </div>
    </div>
  </div>
</div>
