<div class="p-16">
  <app-header>
    <app-button
      (click)="deleteTest()"
      [color]="'error'"
      [icon]="'delete'"
      [disabled]="testData()?.status === 'running'"
      [title]="'Delete'"
    />
    <div class="dropdown dropdown-center">
      <app-button
        [title]="'Export'"
        [color]="'primary'"
        [tabindex]="0"
        [icon]="'save_as'"
      />
      <ul
        tabindex="0"
        class="dropdown-content bg-base-100 rounded-box ring-base-content/10 z-50 mt-4 w-34 p-2 shadow-lg ring-1"
      >
        <li>
          <button
            class="btn btn-ghost w-full justify-center"
            (click)="exportResults('json')"
          >
            JSON
          </button>
        </li>
        <li>
          <button
            class="btn btn-ghost w-full justify-center"
            (click)="exportResults('xlsx')"
          >
            XLSX
          </button>
        </li>
        <li>
          <button
            class="btn btn-ghost w-full justify-center"
            (click)="exportResults('md')"
          >
            Markdown
          </button>
        </li>
      </ul>
    </div>
    <app-button
      (click)="goBack()"
      [color]="'info'"
      [title]="'Dashboard'"
      [icon]="'browse_activity'"
    />
  </app-header>

  <!-- Error State -->
  @if (hasError()) {
    <div class="flex min-h-100 items-center justify-center p-8">
      <div class="max-w-md text-center">
        <app-icon name="warning" class="text-warning mb-4" />
        <h2 class="text-base-content mb-2 text-xl font-semibold">
          Failed to Load Test Details
        </h2>
        <p class="text-base-content/70 mb-4">{{ errorMessage() }}</p>
        <app-button
          (click)="loadTestDetails(testId())"
          [title]="'Try Again'"
          [color]="'primary'"
          [icon]="'search'"
        />
      </div>
    </div>
  }

  <!-- Test Details -->
  @if (!hasError() && testData()) {
    <div class="flex flex-col">
      <!-- Configuration Details -->
      <app-config-details
        [configName]="displayConfigName()"
        [configSnapshot]="testData()?.summary?.configSnapshot"
        [collapsed]="configCollapsed()"
        (collapsedChange)="configCollapsed.set($event)"
      />

      <!-- Test Information -->
      <app-test-summary
        [testData]="testData()"
        [selectedSummary]="selectedSummary()"
        [endpointSummary]="endpointSummary()"
        [isRealTime]="isRealTime()"
        [collapsed]="testInfoCollapsed()"
        (collapsedChange)="testInfoCollapsed.set($event)"
      />

      <!-- Performance Summary -->
      <app-performance-summary
        [selectedSummary]="selectedSummary()"
        [testData]="testData()"
        [selectedEndpoint]="selectedEndpoint()"
        [collapsed]="performanceSummaryCollapsed()"
        (endpointChange)="selectedEndpoint.set($event)"
        (collapsedChange)="performanceSummaryCollapsed.set($event)"
      />

      <!-- Performance Over Time -->
      <app-performance-over-time
        [selectedChartType]="selectedChartType()"
        [selectedEndpoint]="selectedEndpoint()"
        [chartOptions]="availableChartOptions()"
        [testTimeRange]="testTimeRange()"
        [hasChartData]="hasChartData()"
        [yAxisLabel]="getYAxisLabel()"
        [chartId]="getChartId()"
        [chartData]="getCurrentChartData()"
        [collapsed]="performanceOverTimeCollapsed()"
        (chartTypeChange)="selectedChartType.set($event)"
        (collapsedChange)="performanceOverTimeCollapsed.set($event)"
      />
    </div>
  }

  <!-- Delete Confirmation Modal -->
  <app-delete-confirmation-modal
    [isOpen]="showDeleteModal()"
    [test]="testData()!"
    (confirmed)="handleDeleteConfirm()"
    (closed)="handleDeleteCancel()"
  />
</div>
