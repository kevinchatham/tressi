<div
  class="stats stats-vertical md:stats-horizontal bg-base-200 border-base-content/5 flex w-full border shadow-sm"
>
  <!-- Success Rate Stat -->
  <div class="stat place-items-center">
    <div class="stat-title">Success Rate</div>
    <div
      class="stat-value text-success"
      [appFormatPercentage]="successRate() / 100"
    ></div>
  </div>

  <!-- Average RPS Stat -->
  <div class="stat place-items-center">
    <div class="stat-title">Average RPS</div>
    <div
      class="stat-value text-primary"
      [appFormatRps]="selectedSummary()?.averageRequestsPerSecond"
    ></div>
  </div>

  <!-- Peak RPS Stat -->
  <div class="stat place-items-center">
    <div class="stat-title">Peak RPS</div>
    <div
      class="stat-value text-secondary"
      [appFormatRps]="selectedSummary()?.peakRequestsPerSecond"
    ></div>
  </div>

  <!-- P50/95/99 Latency Stat -->
  <div class="stat place-items-center">
    <div class="stat-title">P50 \ 95 \ 99 Latency</div>
    <div class="stat-value text-info">
      <span [appFormatNumber]="selectedSummary()?.p50LatencyMs"></span> \
      <span [appFormatNumber]="selectedSummary()?.p95LatencyMs"></span> \
      <span [appFormatNumber]="selectedSummary()?.p99LatencyMs"></span>
      <span class="text-sm font-normal">ms</span>
    </div>
  </div>

  <!-- Duration Stat -->
  <div class="stat place-items-center">
    <div class="stat-title">Duration</div>
    <div class="stat-value" [appFormatDuration]="getDurationSec()"></div>
  </div>
</div>
