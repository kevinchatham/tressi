<section class="bg-base-100 mt-2 rounded-xl px-6">
  <app-collapsible-card
    title="Performance Summary"
    [collapsed]="collapsed()"
    (collapsedChange)="onCollapsedChange($event)"
  >
    <!-- Header controls projection -->
    <ng-template>
      <select
        id="endpoint-selector"
        class="select select-sm select-neutral w-auto"
        [value]="selectedEndpoint()"
        (change)="onEndpointChange($event)"
      >
        <option value="global">Global Metrics</option>
        @for (
          endpoint of testData()?.summary?.endpoints || [];
          track endpoint.url
        ) {
          <option [value]="endpoint.url">{{ endpoint.url }}</option>
        }
      </select>
    </ng-template>

    <!-- Main content projection -->
    <app-metrics-summary [summary]="selectedSummary()" />
  </app-collapsible-card>
</section>
