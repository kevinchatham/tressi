<div class="container mx-auto p-4">
  <div class="mb-6">
    <div class="flex items-center justify-between">
      <h1 class="text-3xl font-bold">Tressi Load Test Dashboard</h1>
      <div class="flex items-center gap-4">
        <!-- Configuration Selector -->
        <div class="form-control">
          <label class="label">
            <span class="label-text">Configuration</span>
          </label>
          <select
            class="select select-bordered"
            [disabled]="isLoading()"
            (change)="onConfigSelectEvent($event)"
          >
            <option value="">Default Config</option>
            @for (config of safeConfigs(); track config.id) {
              <option [value]="config.id">{{ config.name }}</option>
            }
          </select>
        </div>

        <!-- Settings Button -->
        <button
          (click)="navigateToSettings()"
          class="btn btn-ghost"
          title="Settings"
        >
          <app-icon name="settings" />
          <span class="ml-2 hidden sm:inline">Settings</span>
        </button>
      </div>
    </div>

    <div class="mt-4">
      <button (click)="start()" class="btn btn-primary">Start Load Test</button>
    </div>
  </div>
  <div class="ring-neutral mx-auto max-w-4xl rounded p-4 ring-1">
    <app-line-chart
      [title]="'Global Throughput'"
      [yAxisLabel]="'Rate'"
      [seriesName]="'Requests/Second'"
      [data]="throughputData()"
      [labels]="timeLabels()"
      [height]="350"
      [smoothCurve]="true"
    />
  </div>
  <div class="ring-neutral mx-auto max-w-4xl rounded p-4 ring-1">
    <app-line-chart
      [title]="'Latency (ms)'"
      [yAxisLabel]="'Milliseconds'"
      [seriesName]="'Avg Latency'"
      [data]="latencyData()"
      [labels]="timeLabels()"
      [height]="350"
      [smoothCurve]="false"
    />
  </div>
  <div class="ring-neutral mx-auto max-w-4xl rounded p-4 ring-1">
    <app-line-chart
      [title]="'Error Rate'"
      [yAxisLabel]="'%'"
      [seriesName]="'Errors/Second'"
      [data]="errorRateData()"
      [labels]="timeLabels()"
      [height]="350"
      [smoothCurve]="true"
    />
  </div>
</div>
