<div class="p-16">
  <app-header [title]="'Tressi Dashboard'">
    <!-- Configuration Selector -->
    <div class="form-control">
      <select
        class="select select-bordered"
        [disabled]="isLoading()"
        (change)="onConfigSelectEvent($event)"
        [value]="selectedConfigId()"
      >
        @for (config of safeConfigs(); track config.id) {
          <option [value]="config.id">{{ config.name }}</option>
        }
      </select>
    </div>

    <!-- Settings Button -->
    <button
      (click)="navigateToSettings()"
      class="btn btn-sm btn-ghost btn-circle"
      title="Settings"
    >
      <app-icon name="settings" />
    </button>

    <button
      (click)="start()"
      class="btn btn-sm btn-success btn-circle btn-outline"
      title="Start"
    >
      <app-icon name="bolt" />
    </button>
  </app-header>
  <div class="ring-neutral mx-auto mb-8 rounded p-4 ring-1">
    <app-line-chart
      [title]="'Global Throughput'"
      [yAxisLabel]="'Rate'"
      [seriesName]="'Requests/Second'"
      [data]="throughputData()"
      [labels]="timeLabels()"
      [height]="350"
      [smoothCurve]="true"
    />
  </div>
  <div class="ring-neutral mx-auto mb-8 rounded p-4 ring-1">
    <app-line-chart
      [title]="'Latency (ms)'"
      [yAxisLabel]="'Milliseconds'"
      [seriesName]="'Avg Latency'"
      [data]="latencyData()"
      [labels]="timeLabels()"
      [height]="350"
      [smoothCurve]="false"
    />
  </div>
  <div class="ring-neutral mx-auto rounded p-4 ring-1">
    <app-line-chart
      [title]="'Error Rate'"
      [yAxisLabel]="'%'"
      [seriesName]="'Errors/Second'"
      [data]="errorRateData()"
      [labels]="timeLabels()"
      [height]="350"
      [smoothCurve]="true"
    />
  </div>
</div>
